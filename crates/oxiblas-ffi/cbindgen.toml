# cbindgen configuration for oxiblas-ffi

# The language to output bindings for
language = "C"

# Style for generated headers
header = """/*
 * OxiBLAS - Pure Rust BLAS/LAPACK Library
 * C Header File (Auto-generated by cbindgen)
 *
 * This header provides C-compatible bindings for OxiBLAS functions.
 * Link against liboblas.so (Linux), liboblas.dylib (macOS), or oblas.dll (Windows).
 *
 * Copyright (c) COOLJAPAN OU
 * Licensed under MIT or Apache-2.0
 */
"""

# Include guards
include_guard = "OXIBLAS_H"
autogen_warning = "/* Warning: this file is auto-generated by cbindgen. Do not modify manually. */"

# Use C99 types for compatibility
style = "both"

# Use standard C99 integer types
[defines]
"target_os = linux" = "OBLAS_LINUX"
"target_os = macos" = "OBLAS_MACOS"
"target_os = windows" = "OBLAS_WINDOWS"

[export]
# Prefix for all exported symbols
prefix = ""
# Include all public items
include = []
exclude = []

[export.rename]
# Rename certain types for C compatibility
"OblasComplex32" = "oblas_complex_float"
"OblasComplex64" = "oblas_complex_double"

[enum]
# Use C-style enums
rename_variants = "None"

[struct]
# Rename structs for C conventions
rename_fields = "None"

[fn]
# Function styling
rename_args = "None"
must_use = "OBLAS_MUST_USE"
no_return = "OBLAS_NORETURN"

[parse]
# Parse configuration
parse_deps = false
include = ["oxiblas-ffi"]
extra_bindings = []

[parse.expand]
# Expand macros before parsing
crates = ["oxiblas-ffi"]

[layout]
# Layout options
aligned_n = "OBLAS_ALIGNED"

# Documentation
[documentation]
style = "doxy"

# Additional options
cpp_compat = true
include_version = true
