name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ steps.get_version.outputs.VERSION }}
          draft: false
          prerelease: false
          body_path: CHANGELOG.md

  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: create-release
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Login to crates.io
        run: cargo login ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish oxiblas-core
        run: cargo publish --package oxiblas-core
        continue-on-error: true

      - name: Wait for oxiblas-core to be available
        run: sleep 30

      - name: Publish oxiblas-matrix
        run: cargo publish --package oxiblas-matrix
        continue-on-error: true

      - name: Wait for oxiblas-matrix
        run: sleep 30

      - name: Publish oxiblas-blas
        run: cargo publish --package oxiblas-blas
        continue-on-error: true

      - name: Wait for oxiblas-blas
        run: sleep 30

      - name: Publish oxiblas-lapack
        run: cargo publish --package oxiblas-lapack
        continue-on-error: true

      - name: Wait for oxiblas-lapack
        run: sleep 30

      - name: Publish oxiblas-sparse
        run: cargo publish --package oxiblas-sparse
        continue-on-error: true

      - name: Wait for oxiblas-sparse
        run: sleep 30

      - name: Publish oxiblas-ffi
        run: cargo publish --package oxiblas-ffi
        continue-on-error: true

      - name: Wait for oxiblas-ffi
        run: sleep 30

      - name: Publish oxiblas-ndarray
        run: cargo publish --package oxiblas-ndarray
        continue-on-error: true

      - name: Wait for oxiblas-ndarray
        run: sleep 30

      - name: Publish oxiblas
        run: cargo publish --package oxiblas

  build-documentation:
    name: Build and Deploy Documentation
    runs-on: ubuntu-latest
    needs: publish-crates
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build documentation
        run: cargo doc --all-features --no-deps --workspace

      - name: Create index.html redirect
        run: echo '<meta http-equiv="refresh" content="0; url=oxiblas/index.html">' > target/doc/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./target/doc
          cname: oxiblas.rs  # Optional: if you have a custom domain
